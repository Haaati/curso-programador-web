<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora simples</title>
</head>
<body>
    <!-- Calculadora simples com as operações de Soma, Subtração, Multiplicação e Divisão -->
    <h1>Digite dois números e selecione a operação matemática</h1>
    <p> Soma = 1 </p>
    <p> Subtração = 2 </p>
    <p> Multiplicação = 3 </p>
    <p> Divisão = 4 </p>

    <form method="GET" action="recebe.php">
        <label>Valor 1:</label>
        <input type="number" name="number1">

        <br>

        <label>Valor 2:</label>
        <input type="number" name="number2">

        <br>

        <label>Operação</label>
        <input type="number" name="ope" placeholder="ex: 1, 2, 3 ou 4">

        <br>

        <button type="submit">Enviar</button>>
    </form>
    
</body>
</html>
